# Cross-cutting concerns for the agent-tools suite.
#
# A concern is not real until it has:
# 1. A definition here
# 2. A checker (automated, agentic, or one-time gate)
# 3. A status for every tool in compliance.toml
#
# When adding a new concern: add it here FIRST, then add the checker,
# then add statuses. Enforcement before compliance.
#
# Checker types:
#   "auto"    — script can verify mechanically
#   "agentic" — requires agent review (content quality, not just existence)
#   "gate"    — one-time review that proves the loop was run

[concerns.workspace-routing]
title = "Develop from workspace"
why = "All development happens from agent-tools. Tool AGENTS.md must direct agents here."
applies_to = "all"
type = "auto"
checker = "tool AGENTS.md contains canonical workspace-routing directive"

[concerns.tdd-ratchet]
title = "TDD ratchet enforcement"
why = "New tests must fail before they pass. Prevents trivial/wrong tests and regressions."
applies_to = "all"
type = "auto"
checker = ".test-status.json exists AND cargo test fails (gatekeeper) AND cargo ratchet succeeds"

[concerns.black-box-tests]
title = "Black-box test architecture"
why = "Tests spawn the binary and check behavior from outside. No internal imports. Tests exercise the tool as the user would."
applies_to = "all"
type = "auto"
checker = "tests/ directory exists AND tests use assert_cmd (or equivalent binary-spawning pattern) AND no mod imports from src/"

[concerns.code-standards]
title = "Code standards"
why = "Shared clippy config, shared rustfmt config, workspace-level lint pass clean."
applies_to = "all"
type = "auto"
checker = "cargo fmt --check passes AND cargo clippy -- -D warnings passes (from workspace root)"

[concerns.help-text]
title = "Help text standards"
why = "Consistent --help output: same flag conventions, same formatting, useful descriptions."
applies_to = "all"
type = "agentic"
checker = "agent review: --help output is clear, consistent with sibling tools, describes actual behavior accurately"

[concerns.error-messages]
title = "Error message standards"
why = "Errors explain what happened, what was expected, and what to do next. Not just 'failed to X.'"
applies_to = "all"
type = "agentic"
checker = "agent review: trigger error paths, verify messages include intent + actual state + remediation"

[concerns.landing-page]
title = "Website with standards"
why = "Consistent aesthetic, dark/light mode, install commands, ecosystem links, same design language across all tools."
applies_to = "all"
type = "agentic"
checker = "docs/index.html exists (auto) AND agent review: matches shared aesthetic, has required content sections"

[concerns.release-pipeline]
title = "Release pipeline standards"
why = "Consistent CI: check → build → release → pages. Recreate-on-push pattern. Version bump guard. Correct asset naming. Debounced (cancel-in-progress)."
applies_to = "all"
type = "auto"
checker = "CI workflow has: concurrency/cancel-in-progress, version-bump guard, build matrix, recreate release, pages deploy"

[concerns.auto-update]
title = "Auto-update mechanism"
why = "Tools self-update from GitHub Releases. Background check on startup, replace on next invocation."
applies_to = "all"
type = "auto"
checker = "depends on agent-tools-updater crate AND calls update check at startup"

[concerns.vision-and-process]
title = "Vision and process docs"
why = "Each tool has VISION.md (what it is, why it exists, where it's going) and AGENTS.md with proper development guidance."
applies_to = "all"
type = "agentic"
checker = "agent review: VISION.md exists with clear purpose/direction, AGENTS.md has architecture and testing guidance"

[concerns.opencode-skill]
title = "OpenCode skill published"
why = "Each tool is usable by agents via its skill. Skill has trigger-focused description and actionable content."
applies_to = "all"
type = "agentic"
checker = "docs/SKILL.md exists (auto) AND agent review: frontmatter description is trigger-focused, content is actionable"

[concerns.fast-slow-checks]
title = "Fast and slow check separation"
why = "Fast checks (milliseconds, no real IO) give immediate feedback. Slow checks (seconds+, spawns processes, creates directories) run separately. Build time excluded from the calculation."
applies_to = "all"
type = "auto"
checker = "CI has distinct fast and slow check stages with independent triggers"

[concerns.injectable-io]
title = "Injectable IO for in-process integration tests"
why = "IO boundaries (filesystem, network, subprocess, database) are behind abstractions. Tests swap in in-memory implementations. Full integration logic exercised without real IO — millisecond integration tests instead of subprocess-spawning slow tests."
applies_to = "all"
type = "auto"
checker = "core logic parameterized over IO providers AND in-process integration tests exist using in-memory implementations"

[concerns.code-review]
title = "Code review completed"
why = "The tool has been through a proper thermonuclear review loop. Not just 'CI passes' — someone looked at the code with fresh eyes and judged it sound."
applies_to = "all"
type = "gate"
checker = "one-time: thermonuclear review loop completed and findings addressed"
