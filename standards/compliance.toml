# Compliance state for each tool against each concern.
#
# Valid statuses:
#   "compliant"      — meets the standard, verified by checker
#   "waived"         — explicitly excused (add a comment explaining why)
#   "non-compliant"  — does not meet the standard, work needed
#   "not-applicable" — standard does not apply to this tool
#
# For non-auto concerns (agentic, gate), status is an object with:
#   status   — the compliance status
#   checked  — commit SHA in the tool repo when last verified
#
# The checker can flag stale reviews: if tool HEAD != checked commit,
# the review needs re-running.
#
# Every tool MUST have a status for every concern. No gaps.

[trunc]
workspace-routing = "non-compliant"
tdd-ratchet = "non-compliant"
black-box-tests = "compliant"
code-standards = "non-compliant"
help-text = { status = "non-compliant", checked = "" }
error-messages = { status = "non-compliant", checked = "" }
landing-page = { status = "non-compliant", checked = "" }
release-pipeline = "non-compliant"
auto-update = "non-compliant"
vision-and-process = { status = "non-compliant", checked = "" }
opencode-skill = { status = "non-compliant", checked = "" }
fast-slow-checks = "non-compliant"
injectable-io = "non-compliant"
code-review = { status = "non-compliant", checked = "" }

